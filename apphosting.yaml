# Танзимот барои Firebase App Hosting
# Ин файл ба Firebase мегӯяд, ки чӣ тавр барномаро созад ва кор фармояд.

runConfig:
  # Шумораи ҳадди ақали инстансияҳо барои суръати баланд
  minInstances: 0
  # Шумораи ҳадди аксар барои сарфаи маблағ
  maxInstances: 10
  # Хотираи ҷудошуда
  memoryMiB: 512

# Танзимоти муҳити зист (Environment Variables) дар консоли Firebase илова карда мешаванд
